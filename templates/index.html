<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiliNote 批量收藏转写</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div id="banner" class="banner hidden"></div>

<div class="container">
    <header class="header">
        <h1>BiliNote 批量收藏转写</h1>
        <div class="file-section">
            <button id="select-file-btn" class="btn btn-primary">选择收藏文件</button>
            <input type="file" id="file-input" accept=".json,.csv" hidden>
            <span id="file-name" class="file-name"></span>
        </div>
    </header>

    <section class="config-section">
        <div class="config-row">
            <div class="config-group">
                <label for="provider-select">供应商</label>
                <select id="provider-select">
                    <option value="">-- 请先加载文件 --</option>
                </select>
            </div>
            <div class="config-group">
                <label for="model-select">模型</label>
                <select id="model-select" disabled>
                    <option value="">-- 请先选择供应商 --</option>
                </select>
            </div>
        </div>
        <div class="config-row">
            <div class="config-group">
                <label for="style-select">笔记风格</label>
                <select id="style-select">
                    <option value="detailed">详细笔记（默认）</option>
                    <option value="concise">简洁摘要</option>
                    <option value="detailed">思维导图式</option>
                    <option value="detailed">学习笔记</option>
                    <option value="detailed">技术文档风格</option>
                </select>
            </div>
            <div class="config-group">
                <label for="prompt-input">额外提示词</label>
                <textarea id="prompt-input" placeholder="自定义提示词（可选）" rows="2"></textarea>
            </div>
        </div>
        <div class="config-row options-row">
            <div class="config-group">
                <label>BiliNote 生成选项</label>
                <div class="checkbox-group">
                    <label class="cb-label"><input type="checkbox" id="opt-screenshot"> 视频截图</label>
                    <label class="cb-label"><input type="checkbox" id="opt-link"> 标注链接</label>
                    <label class="cb-label"><input type="checkbox" id="opt-video-understanding"> 视频理解</label>
                </div>
            </div>
            <div class="config-group">
                <label>保存内容</label>
                <div class="checkbox-group">
                    <label class="cb-label"><input type="checkbox" id="save-md" checked> 笔记 Markdown</label>
                    <label class="cb-label"><input type="checkbox" id="save-txt" checked> 原文/字幕</label>
                    <label class="cb-label"><input type="checkbox" id="save-json" checked> 完整 JSON</label>
                    <label class="cb-label"><input type="checkbox" id="save-mindmap"> 思维导图</label>
                </div>
            </div>
        </div>
    </section>

    <section class="batch-section">
        <div class="config-row">
            <div class="config-group" style="flex:2">
                <label for="output-dir">输出目录</label>
                <div class="output-dir-row">
                    <input type="text" id="output-dir" value="./output">
                    <button id="pick-dir-btn" class="btn btn-sm">浏览...</button>
                </div>
            </div>
            <div class="config-group batch-buttons">
                <label>&nbsp;</label>
                <div style="display:flex;gap:8px;">
                    <button id="start-btn" class="btn btn-primary">开始批量处理</button>
                    <button id="stop-btn" class="btn btn-danger" disabled>停止</button>
                    <button id="bilinote-link-btn" class="btn btn-sm" style="background:var(--bg-tertiary);color:var(--text-secondary)" title="打开 BiliNote">打开 BiliNote</button>
                </div>
            </div>
        </div>
    </section>

    <section id="progress-section" class="progress-section" style="display:none">
        <h2>处理进度</h2>
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar" style="width:0%"></div>
        </div>
        <div class="stats-row">
            <span>总数 <strong id="stat-total">0</strong></span>
            <span class="stat-success">成功 <strong id="stat-success">0</strong></span>
            <span class="stat-failed">失败 <strong id="stat-failed">0</strong></span>
            <span class="stat-skipped">跳过 <strong id="stat-skipped">0</strong></span>
            <span>当前 <strong id="stat-current">---</strong></span>
        </div>
        <div id="log-area" class="log-area"></div>
    </section>

    <section class="video-section">
        <div class="video-header">
            <h2>视频列表</h2>
            <span id="video-count" class="video-count">共 0 个视频</span>
        </div>
        <div id="video-toolbar" class="video-toolbar" style="display:none">
            <label class="cb-label"><input type="checkbox" id="select-all"> 全选</label>
            <input type="text" id="search-input" class="search-input" placeholder="搜索 BV 号或标题...">
            <select id="status-filter" class="status-filter">
                <option value="all">全部</option>
                <option value="pending">待处理</option>
                <option value="done">已处理</option>
            </select>
            <span id="selected-count" class="selected-count"></span>
        </div>
        <div id="video-list" class="video-list">
            <div class="empty-state">
                <p class="empty-title">欢迎使用 BiliNote 批量收藏转写</p>
                <ol class="empty-guide">
                    <li>从 <strong>Bilishelf</strong> 浏览器插件导出收藏文件（JSON 或 CSV）</li>
                    <li>点击上方 <strong>"选择收藏文件"</strong> 加载数据</li>
                    <li>选择 <strong>供应商</strong> 和 <strong>模型</strong></li>
                    <li>点击 <strong>"开始批量处理"</strong> 一键生成笔记</li>
                </ol>
            </div>
        </div>
    </section>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
